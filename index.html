<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSync AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* رجعنا لألوانك الأصلية بالضبط */
        :root { --primary: #22d3ee; --bg: #020617; --card: #0f172a; --line: #1e293b; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Cairo', sans-serif; 
            min-height: 100vh;
        }

        /* الهيدر زي ما كان في صورتك الأولى */
        .top-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 5%; background: var(--bg);
            border-bottom: 2px solid var(--primary);
        }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 45px; height: 45px; border-radius: 5px; border: 1px solid var(--primary); }
        .brand-text { font-weight: 700; color: var(--primary); font-size: 1.2rem; }

        .container { padding: 30px 20px; max-width: 600px; margin: auto; }
        .section { display: none; }
        .section.active { display: block; }

        /* منطقة الرفع (المهمة) */
        .upload-container {
            border: 2px dashed #22d3ee80; border-radius: 20px;
            padding: 40px 20px; text-align: center; background: #0f172a50;
            margin-bottom: 30px; cursor: pointer;
        }
        .upload-container i { font-size: 3rem; color: var(--primary); margin-bottom: 15px; }

        /* شبكة الأزرار (نفس تقسيم صورتك) */
        .tools-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; 
        }
        .tool-btn {
            background: var(--card); border: 1px solid var(--line);
            border-radius: 15px; padding: 25px; text-align: center;
            cursor: pointer; transition: 0.2s;
        }
        .tool-btn:hover { border-color: var(--primary); transform: translateY(-3px); }
        .tool-btn i { font-size: 2rem; color: var(--primary); margin-bottom: 10px; display: block; }
        .tool-btn span { font-weight: 600; font-size: 0.9rem; }

        /* القائمة الجانبية */
        .menu-btn { font-size: 1.5rem; color: var(--primary); cursor: pointer; }
    </style>
</head>
<body>

<header class="top-bar">
    <div class="menu-btn"><i class="fa-solid fa-bars"></i></div>
    <div class="logo-area">
        <div style="text-align:right">
            <span class="brand-text">EduSync AI</span><br>
            <span style="font-size:0.6rem; color:#94a3b8">المزامنة التعليمية الذكية</span>
        </div>
        <img src="1A9FCFDC-779E-4D60-9CC7-32F9D6705596.png" class="logo-img" onerror="this.src='https://i.ibb.co/v4S8L8Y/logo.png'">
    </div>
</header>

<div class="container">
    <h2 style="text-align:center; margin-bottom:25px; font-size: 1.3rem;">ابدأ برفع ملف المنهج 🚀</h2>

    <div class="upload-container" onclick="document.getElementById('fileInput').click()">
        <i class="fa-solid fa-cloud-arrow-up"></i>
        <p id="statusText">ارفع ملف الـ PDF هنا</p>
        <input type="file" id="fileInput" hidden accept=".pdf">
    </div>

    <div class="tools-grid">
        <div class="tool-btn">
            <i class="fa-solid fa-microphone"></i>
            <span>بودكاست</span>
        </div>
        <div class="tool-btn">
            <i class="fa-solid fa-check-double"></i>
            <span>اختبارات</span>
        </div>
        <div class="tool-btn">
            <i class="fa-solid fa-brain"></i>
            <span>خرائط</span>
        </div>
        <div class="tool-btn">
            <i class="fa-solid fa-layer-group"></i>
            <span>بطاقات</span>
        </div>
    </div>
</div>

<script>
    document.getElementById('fileInput').onchange = function() {
        if(this.files[0]) {
            document.getElementById('statusText').innerText = "✅ جاهز: " + this.files[0].name;
            document.getElementById('statusText').style.color = "#22d3ee";
        }
    };
</script>

</body>
</html>
