<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSync AI | صانع البودكاست التعليمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #22d3ee; --bg: #020617; --card: #0f172a; --glass: rgba(30, 41, 59, 0.7); --accent: #f43f5e; }
        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body { 
            background: radial-gradient(circle at top, #1e293b 0%, #020617 100%);
            color: white; font-family: 'Cairo', sans-serif; margin: 0; min-height: 100vh;
        }

        /* هيدر احترافي */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 5%; background: var(--glass); backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(34, 211, 238, 0.2); position: sticky; top: 0; z-index: 1000;
        }
        .logo-box { display: flex; align-items: center; gap: 15px; }
        .logo-img { width: 50px; height: 50px; border-radius: 12px; border: 1px solid var(--primary); box-shadow: 0 0 15px rgba(34, 211, 238, 0.3); }
        .brand-title { line-height: 1.1; text-align: right; }
        .brand-en { font-weight: 700; color: var(--primary); font-size: 1.3rem; }
        .brand-ar { font-size: 0.8rem; color: #94a3b8; }

        /* منطقة المحتوى */
        .main-container { padding: 40px 20px; max-width: 800px; margin: auto; }
        .hero-section { text-align: center; margin-bottom: 40px; }
        .hero-section h1 { font-size: 2rem; background: linear-gradient(to left, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        
        /* كرت الرفع الاحترافي */
        .upload-card {
            background: var(--card); border-radius: 24px; padding: 40px;
            border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            text-align: center;
        }
        .drop-zone {
            border: 2px dashed rgba(34, 211, 238, 0.3); border-radius: 20px;
            padding: 50px 20px; background: rgba(34, 211, 238, 0.02); cursor: pointer;
            margin-bottom: 25px;
        }
        .drop-zone:hover { border-color: var(--primary); background: rgba(34, 211, 238, 0.05); }
        .drop-zone i { font-size: 3.5rem; color: var(--primary); margin-bottom: 20px; }

        /* الأزرار */
        .btn-convert {
            background: var(--primary); color: #020617; border: none; width: 100%;
            padding: 18px; border-radius: 15px; font-weight: 700; font-size: 1.1rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        .btn-convert:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(34, 211, 238, 0.2); }

        /* مشغل البودكاست (يظهر بعد التحويل) */
        #podcastResult {
            display: none; margin-top: 30px; padding: 25px; background: rgba(255,255,255,0.03);
            border-radius: 20px; border: 1px solid var(--primary); animation: slideUp 0.5s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .loading-shimmer { display: none; color: var(--primary); margin: 20px 0; font-weight: 600; }
    </style>
</head>
<body>

<header class="header">
    <div style="font-size: 1.5rem; color: var(--primary); cursor: pointer;"><i class="fa-solid fa-bars-staggered"></i></div>
    <div class="logo-box">
        <div class="brand-title">
            <span class="brand-en">EduSync AI</span><br>
            <span class="brand-ar">المزامنة التعليمية الذكية</span>
        </div>
        <img src="https://raw.githubusercontent.com/Abdullah1396/EduSync-AI/main/1A9FCFDC-779E-4D60-9CC7-32F9D6705596.png" class="logo-img" onerror="this.src='https://i.ibb.co/v4S8L8Y/logo.png'">
    </div>
</header>

<main class="main-container">
    <div class="hero-section">
        <h1>صانع البودكاست التعليمي 🎧</h1>
        <p style="color: #94a3b8;">ارفع ملف المنهج (PDF) وسيقوم الذكاء الاصطناعي بتحويله إلى حوار يشرح لك المادة</p>
    </div>

    <div class="upload-card">
        <div class="drop-zone" onclick="document.getElementById('fileIn').click()">
            <i class="fa-solid fa-file-pdf"></i>
            <h3 id="fileName">اضغط هنا لرفع ملف المنهج</h3>
            <p style="color: #64748b; font-size: 0.85rem;">ندعم ملفات PDF حتى حجم 25MB</p>
            <input type="file" id="fileIn" hidden accept=".pdf">
        </div>

        <button class="btn-convert" onclick="startAI()">
            <i class="fa-solid fa-wand-magic-sparkles"></i> إنشاء Audio Overview (NotebookLM)
        </button>

        <div class="loading-shimmer" id="loader">
            <i class="fa-solid fa-circle-notch fa-spin"></i> جاري تحليل المنهج وتوليد الحوار الصوتي...
        </div>

        <div id="podcastResult">
            <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px;">
                <div style="background:var(--primary); color:#000; padding:10px; border-radius:10px;"><i class="fa-solid fa-play"></i></div>
                <div style="text-align:right;">
                    <p style="margin:0; font-weight:700;">شرح المنهج بصوت سارة وخالد</p>
                    <p style="margin:0; font-size:0.8rem; color:#94a3b8;">مدة البودكاست: 04:32 دقيقة</p>
                </div>
            </div>
            <audio controls style="width: 100%;">
                <source src="#" type="audio/mpeg">
            </audio>
        </div>
    </div>
</main>

<script>
    const fileIn = document.getElementById('fileIn');
    const fileName = document.getElementById('fileName');
    const loader = document.getElementById('loader');
    const podcastResult = document.getElementById('podcastResult');

    fileIn.onchange = function() {
        if(this.files[0]) {
            fileName.innerText = "✅ تم اختيار: " + this.files[0].name;
            fileName.style.color = "#22d3ee";
        }
    }

    function startAI() {
        if(!fileIn.files[0]) {
            alert("يا بطل، ارفع ملف الـ PDF أولاً!");
            return;
        }
        loader.style.display = "block";
        podcastResult.style.display = "none";
        
        setTimeout(() => {
            loader.style.display = "none";
            podcastResult.style.display = "block";
            alert("تم توليد البودكاست بنجاح! يمكنك الآن الاستماع لشرح المنهج.");
        }, 3500);
    }
</script>

</body>
</html>
