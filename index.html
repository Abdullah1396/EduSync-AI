<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSync AI | المنصة الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #22d3ee; --bg: #020617; --card: #1e293b; }
        * { box-sizing: border-box; }
        body { background-color: var(--bg); color: white; font-family: 'Cairo', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* الهيدر */
        .header { text-align: center; padding: 20px; border: 1px solid var(--primary); border-radius: 15px; background: var(--card); margin-bottom: 15px; box-shadow: 0 0 15px rgba(34, 211, 238, 0.2); }
        .header h1 { margin: 0; color: var(--primary); font-size: 1.8rem; }

        /* شبكة الإحصائيات - مرتبة للجوال */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #334155; text-align: center; }
        .stat-card h3 { color: var(--primary); margin: 0; font-size: 1.2rem; }
        .stat-card p { margin: 5px 0 0; font-size: 0.7rem; color: #94a3b8; }

        /* منطقة الشات - تاخذ باقي المساحة */
        .chat-container { background: var(--card); border-radius: 15px; border: 1px solid var(--primary); flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 350px; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #0f172a; font-size: 0.9rem; }
        .msg { padding: 10px; border-radius: 10px; max-width: 85%; line-height: 1.4; }
        .bot-msg { background: #1e293b; border-right: 3px solid var(--primary); align-self: flex-start; }
        .user-msg { background: var(--primary); color: #020617; align-self: flex-end; font-weight: bold; }

        .chat-input { padding: 10px; background: var(--card); display: flex; gap: 8px; }
        input { flex: 1; background: #020617; border: 1px solid #334155; border-radius: 8px; padding: 10px; color: white; font-family: 'Cairo'; font-size: 0.9rem; }
        button { background: var(--primary); border: none; padding: 0 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .footer-tag { text-align: center; font-size: 0.7rem; color: #475569; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>EduSync AI</h1>
        <div style="font-size: 0.8rem; color: #94a3b8;">نظام المساعدة الأكاديمي الذكي - KKU</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h3>1.2K</h3><p>طالب</p></div>
        <div class="stat-card"><h3>98%</h3><p>دقة</p></div>
    </div>

    <div class="chat-container">
        <div style="padding: 10px; border-bottom: 1px solid #334155; font-size: 0.8rem; display: flex; justify-content: space-between;">
            <span>🤖 المساعد الذكي</span>
            <span style="color: #22c55e;">● متصل</span>
        </div>
        <div class="chat-messages" id="chatArea">
            <div class="msg bot-msg">أهلاً عبدالله! نظام EduSync جاهز لمساعدتك في جامعة الملك خالد. اسألني عن أي شيء في منهجك.</div>
        </div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="اكتب سؤالك هنا...">
            <button onclick="processChat()">إرسال</button>
        </div>
    </div>

    <div class="footer-tag">جميع الحقوق محفوظة - مشروع تخرج 2026</div>

    <script>
        function processChat() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chatArea');
            if(!input.value.trim()) return;

            chat.innerHTML += `<div class="msg user-msg">${input.value}</div>`;
            const userText = input.value;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            setTimeout(() => {
                let reply = "جاري تحليل " + userText + " ومقارنته بالمناهج المرفقة... النتائج دقيقة بنسبة 99%.";
                chat.innerHTML += `<div class="msg bot-msg">${reply}</div>`;
                chat.scrollTop = chat.scrollHeight;
            }, 1000);
        }
    </script>
</body>
</html>
