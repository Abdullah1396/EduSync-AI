<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSync AI - KKU</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #22d3ee; --bg: #0f172a; }
        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Cairo', sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            text-align: center; 
        }
        .container { 
            border: 2px solid var(--primary); 
            padding: 3rem; 
            border-radius: 25px; 
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.3); 
            background: rgba(30, 41, 59, 0.8); 
            max-width: 400px;
        }
        h1 { color: var(--primary); font-size: 2.2rem; margin-bottom: 10px; text-shadow: 0 0 10px var(--primary); }
        p { font-size: 1.1rem; color: #94a3b8; margin-bottom: 20px; }
        .btn { 
            background: var(--primary); 
            color: #0f172a; 
            border: none; 
            padding: 15px 30px; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <h1>EduSync AI</h1>
        <p>مساعدك الأكاديمي الذكي - جامعة الملك خالد</p>
        <button class="btn" onclick="alert('النظام يعمل بنجاح ✅')">تشغيل المساعد</button>
    </div>
</body>
</html>
